<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Bet</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <div id="root-game-container">
        <div id="feed-notificacoes" class="feed-container"></div>

        <div class="header-plataforma">
            <h1>🐯 Robert Bet</h1>
        </div>

        <div class="painel-saldo">
            <span class="label-saldo">Saldo Disponível:</span>
            <div id="saldo" class="valor-saldo">R$ 50,00</div>
        </div>

        <div class="container-financeiro-botoes">
            <button id="botao-deposito" class="btn-financeiro btn-deposito" onclick="window.depositar()">
                ⚡ DEPOSITAR
            </button>
            <button id="botao-saque" class="btn-financeiro btn-saque" onclick="window.sacar()">
                💰 SACAR PIX
            </button>
        </div>

        <div class="container-roleta">
            <div class="marcador-topo">▼</div>
            <div class="borda-roleta">
                <div id="roleta" class="roleta-corpo">
                    <div class="fatia fatia-0"><span>0x</span></div>
                    <div class="fatia fatia-1"><span>2x</span></div>
                    <div class="fatia fatia-2"><span>0x</span></div>
                    <div class="fatia fatia-3"><span>5x</span></div>
                    <div class="fatia fatia-4"><span>0x</span></div>
                    <div class="fatia fatia-5"><span>10x</span></div>
                </div>
            </div>
        </div>

        <div class="controle-apostas">
            <p class="titulo-secao">Escolha sua Aposta:</p>
            <div class="seletor-aposta">
                <button class="btn-ajuste" onclick="window.alterarAposta(-1)">-</button>
                <div id="valor-aposta" class="display-aposta">R$ 2,00</div>
                <button class="btn-ajuste" onclick="window.alterarAposta(1)">+</button>
            </div>
        </div>

        <button id="botao-girar" class="btn-girar" onclick="window.girarRoleta()">
            🎰 GIRAR ROLETA
        </button>
    </div>

    <script type="module" src="./src/script.js"></script>
</body>
</html>
