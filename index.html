<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert Bet - Tiger Slot</title>
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>
    <div id="root-game-container">
        <div id="feed-notificacoes" class="feed-container"></div>

        <div class="header-plataforma">
            <h1>🐯 Robert Tiger</h1>
        </div>

        <div class="painel-saldo">
            <span class="label-saldo">Saldo Disponível:</span>
            <div id="saldo" class="valor-saldo">R$ 50,00</div>
        </div>

        <div class="container-financeiro-botoes">
            <button id="botao-deposito" class="btn-financeiro btn-deposito" onclick="window.abrirModalDeposito()">
                ⚡ DEPOSITAR
            </button>
            <button id="botao-saque" class="btn-financeiro btn-saque" onclick="window.sacar()">
                💰 SACAR PIX
            </button>
        </div>

        <div class="container-slots">
            <div class="moldura-templo">
                <div class="linha-ganho-horizontal"></div>
                
                <div class="coluna-reel">
                    <div id="reel-0" class="reel-conteudo"></div>
                </div>
                
                <div class="coluna-reel">
                    <div id="reel-1" class="reel-conteudo"></div>
                </div>
                
                <div class="coluna-reel">
                    <div id="reel-2" class="reel-conteudo"></div>
                </div>
            </div>
        </div>

        <div class="controle-apostas">
            <p class="titulo-secao">Escolha sua Aposta:</p>
            <div class="seletor-aposta">
                <button class="btn-ajuste" onclick="window.alterarAposta(-1)">-</button>
                <div id="valor-aposta" class="display-aposta">R$ 2,00</div>
                <button class="btn-ajuste" onclick="window.alterarAposta(1)">+</button>
            </div>
        </div>

        <button id="botao-girar" class="btn-girar" onclick="window.girarSlots()">
            🎰 GIRAR TIGRE
        </button>
    </div>

    <div id="modal-deposito" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>⚡ Validar Conta via PIX</h2>
            <p class="instrucao-modal">Preencha seus dados abaixo para autenticação e liberação de saldo:</p>
            
            <div class="campo-input">
                <label for="pix-nome">Nome Completo do Titular:</label>
                <input type="text" id="pix-nome" placeholder="Nome do beneficiário">
            </div>

            <div class="campo-input">
                <label for="pix-chave">Chave PIX para Recebimento:</label>
                <input type="text" id="pix-chave" placeholder="CPF, Celular, E-mail ou Aleatória">
            </div>

            <div class="campo-input">
                <label for="pix-valor-dep">Valor do Depósito (R$):</label>
                <input type="number" id="pix-valor-dep" placeholder="Ex: 20.00" value="20.00">
            </div>

            <div class="modal-botoes">
                <button class="btn-modal-salvar" onclick="window.salvarEDepositarPIX()">Salvar e Confirmar</button>
                <button class="btn-modal-fechar" onclick="window.fecharModalDeposito()">Voltar</button>
            </div>
        </div>
    </div>

    <script src="./src/script.js?v=203"></script>
</body>
</html>
